<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Glory ❤️</title>

<style>
body {
    background-color: #000;
    margin: 0;
    overflow: hidden;
    color: #ff4d6d;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Envelope */
#envelope {
    font-size: 80px;
    cursor: pointer;
    transition: 1s;
}

/* Letter */
#letter {
    display: none;
    max-width: 400px;
    text-align: center;
    background: rgba(20, 0, 0, 0.9);
    padding: 30px;
    border: 1px solid #ff4d6d;
    box-shadow: 0 0 20px #ff4d6d;
    border-radius: 15px;
}

#letter h1 { margin-bottom: 15px; }
#typedText { color: #fff; line-height: 1.6; }

/* Buttons */
button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 10px;
    cursor: pointer;
    border-radius: 5px;
    font-weight: bold;
    box-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Love question */
#loveBox {
    display: none;
    margin-top: 20px;
}

#noBtn {
    position: absolute;
}

/* Floating hearts */
.heart-float {
    position: absolute;
    color: #ff4d6d;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* Canvas */
canvas {
    position: absolute;
    display: none;
}

.fade-in { animation: fadeIn 2s forwards; }
@keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
</style>
</head>

<body>

<div id="envelope">✉️</div>

<div id="letter">
    <h1>To My Dearest Glory 💖</h1>
    <p id="typedText"></p>

    <div id="loveBox">
        <p>Do you love me? 😏</p>
        <button onclick="showHeart()">Yes ❤️</button>
        <button id="noBtn">No 😭</button>
    </div>
</div>

<canvas id="heart"></canvas>

<audio id="bgMusic" loop>
    <source src="your-music-file.mp3" type="audio/mpeg">
</audio>

<script>
const envelope = document.getElementById('envelope');
const letter = document.getElementById('letter');
const canvas = document.getElementById('heart');
const ctx = canvas.getContext('2d');
const noBtn = document.getElementById("noBtn");

/* Romantic Message */
const message = `From the moment you came into my life, everything changed.

You became my peace in chaos,
my smile in sadness,
and the reason my heart beats with so much joy.

If I could give you one thing in this world,
it would be the ability to see yourself through my eyes.

I love you endlessly, Glory 💖`;

let i = 0;
function typeWriter() {
    if (i < message.length) {
        document.getElementById("typedText").innerHTML += message.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    } else {
        document.getElementById("loveBox").style.display = "block";
    }
}

/* Open letter */
envelope.onclick = () => {
    envelope.style.display = 'none';
    letter.style.display = 'block';
    letter.classList.add('fade-in');
    typeWriter();
    startHearts();
    document.getElementById("bgMusic").play().catch(()=>{});
};

/* Floating hearts */
function startHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart-float");
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}

/* Runaway NO button 😂 */
noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* Show heart animation */
function showHeart() {
    letter.style.display = 'none';
    canvas.style.display = 'block';
    canvas.classList.add('fade-in');
    initHeart();
}

/* 3D Heart */
let width, height;
let angleY = 0;
const text = "I LOVE YOU GLORY";

function initHeart() {
    resize();
    window.addEventListener('resize', resize);
    render();
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

function getHeartPoint(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t))
    };
}

function render() {
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fillRect(0, 0, width, height);

    ctx.fillStyle = '#ff4d6d';
    ctx.font = '12px Courier New';

    const centerX = width / 2;
    const centerY = height / 2;
    const scale = Math.min(width, height) / 45;

    for (let t = 0; t < Math.PI * 2; t += 0.15) {
        const p = getHeartPoint(t);

        const x3d = p.x * Math.cos(angleY);
        const z3d = p.x * Math.sin(angleY);
        const s = 1 + z3d / 20;

        ctx.save();
        ctx.translate(centerX + x3d * scale, centerY + p.y * scale);
        ctx.scale(s, s);
        ctx.rotate(angleY * 0.5);
        ctx.fillText(text, 0, 0);
        ctx.restore();
    }

    angleY += 0.02;
    requestAnimationFrame(render);
}
</script>

</body>
</html>
