<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Glory</title>
    <style>
        :root {
            --primary: #ff2d55;
            --primary-glow: rgba(255, 45, 85, 0.5);
            --bg: #050505;
            --glass: rgba(20, 20, 20, 0.8);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- Utility Classes --- */
        .scene {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1.5s ease, transform 1.5s ease;
            text-align: center;
            padding: 20px;
        }

        .active { opacity: 1; visibility: visible; }
        .hidden { display: none; }

        /* --- Background Particles --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        /* --- Scene 1: Entry --- */
        #envelope-icon {
            font-size: 80px;
            cursor: pointer;
            filter: drop-shadow(0 0 15px var(--primary-glow));
            animation: float 3s ease-in-out infinite;
            transition: transform 0.5s ease;
        }
        #envelope-icon:hover { transform: scale(1.1); }

        /* --- Scene 2: Letter --- */
        .letter-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .letter-card h1 {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .typewriter {
            font-size: 1.1rem;
            line-height: 1.8;
            min-height: 150px;
            color: #ddd;
        }

        /* --- Buttons --- */
        .btn-group {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 12px 35px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
            font-size: 1rem;
        }

        .btn-yes {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-no {
            background: transparent;
            border: 1px solid #555;
            color: #aaa;
            position: relative;
        }

        /* --- Scene 4: Gallery --- */
        .gallery-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo-frame {
            position: absolute;
            width: 280px;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: all 1.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: slowZoom 20s linear infinite;
        }

        .photo-caption {
            position: absolute;
            bottom: 40px;
            width: 100%;
            font-size: 1.2rem;
            text-shadow: 2px 2px 10px black;
            font-style: italic;
        }

        /* --- Animations --- */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes slowZoom {
            from { transform: scale(1); }
            to { transform: scale(1.15); }
        }

        #heart-canvas {
            display: none;
            position: fixed;
            top: 0; left: 0;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/My-Love-Piano-Melody.mp3" type="audio/mpeg">
    </audio>

    <div id="scene1" class="scene active">
        <div id="envelope-icon">✉️</div>
        <p style="margin-top: 20px; color: #888; letter-spacing: 3px;">FOR GLORY</p>
    </div>

    <div id="scene2" class="scene">
        <div class="letter-card">
            <h1>To My Dearest Glory</h1>
            <div id="typewriter-text" class="typewriter"></div>
            <div id="question-area" class="hidden">
                <p style="margin-top:20px; font-weight: bold;">Do you love me?</p>
                <div class="btn-group">
                    <button class="btn btn-yes" onclick="nextToGallery()">YES ❤️</button>
                    <button id="no-btn" class="btn btn-no">NO 😅</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scene3" class="scene">
        <div id="gallery-target" class="gallery-container">
            </div>
    </div>

    <div id="scene4" class="scene">
        <button class="btn btn-yes" style="z-index: 100;" onclick="startHeart()">Feel My Heart</button>
    </div>

    <canvas id="heart-canvas"></canvas>

    <script>
        const scenes = [document.getElementById('scene1'), document.getElementById('scene2'), document.getElementById('scene3'), document.getElementById('scene4')];
        const music = document.getElementById('bg-music');
        
        // --- Particle Background Logic ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        function resize() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5;
                this.opacity = Math.random();
            }
            draw() {
                bgCtx.fillStyle = `rgba(255, 45, 85, ${this.opacity})`;
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
            }
            update() {
                this.y -= this.speed;
                if (this.y < 0) this.y = bgCanvas.height;
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animateBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- Navigation Logic ---
        document.getElementById('envelope-icon').onclick = () => {
            music.volume = 0;
            music.play();
            let fadeIn = setInterval(() => {
                if (music.volume < 0.5) music.volume += 0.05;
                else clearInterval(fadeIn);
            }, 200);

            transition(0, 1);
            startTypewriter();
        };

        function transition(from, to) {
            scenes[from].classList.remove('active');
            setTimeout(() => {
                scenes[from].classList.add('hidden');
                scenes[to].classList.remove('hidden');
                setTimeout(() => scenes[to].classList.add('active'), 100);
            }, 1000);
        }

        // --- Typewriter Logic ---
        const message = "From the moment you came into my life, everything changed. You became my peace, my happiness, and my reason to smile. If I could give you one thing, it would be the ability to see yourself through my eyes. I love you endlessly.";
        function startTypewriter() {
            let i = 0;
            const container = document.getElementById('typewriter-text');
            function type() {
                if (i < message.length) {
                    container.innerHTML += message.charAt(i);
                    i++;
                    setTimeout(type, 50);
                } else {
                    document.getElementById('question-area').classList.remove('hidden');
                }
            }
            setTimeout(type, 1500);
        }

        // --- No Button Behavior ---
        const noBtn = document.getElementById('no-btn');
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * 100 - 50;
            const y = Math.random() * 100 - 50;
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
        });

        // --- Gallery Logic ---
        const galleryData = [
            { url: 'https://69a6cf6b581800b707fba802.imgix.net/Glory/1000288151.png?w=768&h=1344', cap: 'You are everything beautiful in my life' },
            { url: 'https://69a6cf6b581800b707fba802.imgix.net/Glorylove/1000370917.jpg?w=1080&h=1920', cap: 'And I will always choose you' },
            { url: 'https://69a6cf6b581800b707fba802.imgix.net/Glory/1000371666.jpg?w=2160&h=2880', cap: 'This is just the beginning of us' }
        ];

        function nextToGallery() {
            transition(1, 2);
            let delay = 2000;
            galleryData.forEach((item, index) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.className = 'photo-frame';
                    div.innerHTML = `<img src="${item.url}"><div class="photo-caption">${item.cap}</div>`;
                    document.getElementById('gallery-target').innerHTML = ''; 
                    document.getElementById('gallery-target').appendChild(div);
                    setTimeout(() => { div.style.opacity = '1'; div.style.transform = 'scale(1) translateY(0)'; }, 100);
                    
                    if (index === galleryData.length - 1) {
                        setTimeout(() => transition(2, 3), 4000);
                    }
                }, index * 4000);
            });
        }

        // --- 3D Heart Canvas Logic ---
        const heartCanvas = document.getElementById('heart-canvas');
        const hCtx = heartCanvas.getContext('2d');
        let heartT = 0;

        function startHeart() {
            scenes[3].classList.remove('active');
            heartCanvas.style.display = 'block';
            heartCanvas.width = window.innerWidth;
            heartCanvas.height = window.innerHeight;
            animateHeart();
        }

        function animateHeart() {
            hCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            hCtx.fillRect(0, 0, heartCanvas.width, heartCanvas.height);
            
            const centerX = heartCanvas.width / 2;
            const centerY = heartCanvas.height / 2;
            const scale = Math.min(heartCanvas.width, heartCanvas.height) / 50;

            hCtx.font = '14px Helvetica';
            hCtx.fillStyle = '#ff2d55';

            for (let i = 0; i < Math.PI * 2; i += 0.1) {
                const x = 16 * Math.pow(Math.sin(i), 3);
                const y = -(13 * Math.cos(i) - 5 * Math.cos(2 * i) - 2 * Math.cos(3 * i) - Math.cos(4 * i));
                
                const rotX = x * Math.cos(heartT);
                const z = x * Math.sin(heartT);
                const perspective = 1 + z / 20;

                hCtx.save();
                hCtx.translate(centerX + rotX * scale, centerY + y * scale);
                hCtx.scale(perspective, perspective);
                hCtx.globalAlpha = 0.5 + perspective / 2;
                hCtx.fillText("I LOVE YOU GLORY", 0, 0);
                hCtx.restore();
            }
            heartT += 0.02;
            requestAnimationFrame(animateHeart);
        }
    </script>
</body>
</html>
